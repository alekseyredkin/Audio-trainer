// ============================================
// ГЛОБАЛЬНОЕ СОСТОЯНИЕ
// ============================================
let currentMode = 'learn';
let wordsList = [];
let currentIndex = 0;
let totalWordsInSession = 0;
let sessionTotalCount = 0;
let currentLevelKey = '';

// Таймеры (объявлены глобально для надёжной очистки)
let autoNextTimeout = null;
let safetyTimeout = null;
let pauseTimeout = null;
let speakTimeout = null;

// Флаг активности: если false — все операции прекращаются
let isTrainerActive = false;

// Проверка поддержки SpeechSynthesis
const isSpeechSupported = 'speechSynthesis' in window && 'SpeechSynthesisUtterance' in window;

// ============================================
// ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
// ============================================

function toggleExclusive(clickedElement, otherId) {
    const otherElement = document.getElementById(otherId);
    if (otherElement && clickedElement.checked) {
        otherElement.checked = false;
    }
}

/**
 * Исправленный парсинг: разделяет только по ПЕРВОМУ вхождению ' - '
 * Это позволяет корректно обрабатывать слова типа "Mother-in-law"
 */
function parseWords(text) {
    if (!text) return [];
    return text.split(';').map(p => {
        p = p.trim();
        if (!p) return null;
        
        const dashIndex = p.indexOf(' - ');
        if (dashIndex > -1) {
            return { 
                en: p.slice(0, dashIndex).trim(), 
                ru: p.slice(dashIndex + 3).trim() 
            };
        }
        return null;
    }).filter(w => w !== null && w.en && w.ru);
}

function showError(elementId, message) {
    const el = document.getElementById(elementId);
    if (el) {
        el.textContent = message;
        // Скрыть ошибку через 5 секунд
        setTimeout(() => { if (el.textContent === message) el.textContent = ''; }, 5000);
    }
}

function clearAllTimers() {
    [autoNextTimeout, safetyTimeout, pauseTimeout, speakTimeout].forEach(t => clearTimeout(t));
    autoNextTimeout = safetyTimeout = pauseTimeout = speakTimeout = null;
}

/**
 * Полная остановка: синтез речи, таймеры, сброс флагов
 */
function forceStopAll() {
    isTrainerActive = false;
    
    // Остановка синтеза речи
    if (window.speechSynthesis) {
        window.speechSynthesis.cancel();
        // На некоторых браузерах нужен resume перед cancel
        if (window.speechSynthesis.paused) {
            window.speechSynthesis.resume();
            setTimeout(() => window.speechSynthesis.cancel(), 50);
        }
    }
    
    clearAllTimers();
    
    // Сброс визуальных состояний
    const wordEn = document.getElementById('word-en');
    if (wordEn) wordEn.classList.remove('speaking');
    const wordRu = document.getElementById('word-ru');
    if (wordRu) wordRu.classList.remove('visible');
}

// ============================================
// ИНИЦИАЛИЗАЦИЯ И НАВИГАЦИЯ
// ============================================

function initMenu() {
    forceStopAll();
    sessionTotalCount = 0;
    
    const list = document.getElementById('levels-list');
    const errorEl = document.getElementById('menu-error');
    
    if (!list) return;
    
    list.innerHTML = '';
    errorEl.textContent = '';
    
    // Проверка поддержки синтеза речи
    if (!isSpeechSupported) {
        showError('menu-error', '⚠️ Ваш браузер не поддерживает озвучку. Попробуйте Chrome, Edge или Safari.');
    }
    
    Object.entries(WORD_LEVELS).forEach(([key, level]) => {
        // Кэшируем распарсенные слова, чтобы не парсить каждый раз
        if (!level.parsed) {
            level.parsed = parseWords(level.data);
        }
        
        const wordsCount = level.parsed.length;
        if (wordsCount === 0) return;
        
        const btn = document.createElement('button');
        btn.className = 'level-btn';
        btn.textContent = `${level.title} (${wordsCount} слов)`;
        btn.setAttribute('aria-label', `Начать уровень: ${level.title}`);
        btn.onclick = () => startLevel(key);
        list.appendChild(btn);
    });
    
    if (list.children.length === 0) {
        showError('menu-error', '❌ Нет доступных тем для изучения.');
    }
    
    showScreen('menu-screen');
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    const target = document.getElementById(id);
    if (target) {
        target.classList.add('active');
        // Для доступности: фокус на заголовок экрана
        const heading = target.querySelector('h1');
        if (heading) heading.focus?.();
    }
}

// ============================================
// ЛОГИКА ТРЕНАЖЁРА
// ============================================

function startLevel(key) {
    if (!isSpeechSupported) {
        showError('menu-error', 'Озвучка не поддерживается этим браузером.');
        return;
    }
    
    isTrainerActive = true;
    currentLevelKey = key;
    
    const level = WORD_LEVELS[key];
    if (!level || !level.parsed || level.parsed.length === 0) {
        showError('menu-error', '❌ Тема пуста или не загружена.');
        isTrainerActive = false;
        return;
    }
    
    // Копируем и перемешиваем массив (алгоритм Фишера-Йейтса)
    wordsList = [...level.parsed];
    for (let i = wordsList.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [wordsList[i], wordsList[j]] = [wordsList[j], wordsList[i]];
    }

    totalWordsInSession = wordsList.length;
    currentIndex = 0;
    
    updateProgressBar();
    showScreen('trainer-screen');
    
    // Небольшая задержка для плавности перед стартом аудио
    speakTimeout = setTimeout(() => {
        if (isTrainerActive) showCurrentWord();
    }, 150);
}

function showCurrentWord() {
    if (!isTrainerActive) return;
    
    // Очищаем таймеры перед показом нового слова
    clearAllTimers();

    if (currentIndex >= totalWordsInSession) {
        handleLevelEnd();
        return;
    }
    
    const word = wordsList[currentIndex];
    const wordEnEl = document.getElementById('word-en');
    const wordRuEl = document.getElementById('word-ru');
    
    if (!wordEnEl || !wordRuEl) return;
    
    // Сброс UI
    wordRuEl.classList.remove('visible');
    wordEnEl.classList.remove('speaking');
    wordEnEl.textContent = word.en;
    wordRuEl.textContent = word.ru;
    
    updateProgressBar();
    
    speakCurrentWord(word);
}

function handleLevelEnd() {
    if (!isTrainerActive) return;
    
    const loopSame = document.getElementById('loop-same-theme')?.checked;
    const loopRandom = document.getElementById('loop-random-themes')?.checked;
    
    sessionTotalCount += totalWordsInSession;
    
    // Пауза перед перезапуском или финалом
    speakTimeout = setTimeout(() => {
        if (!isTrainerActive) return;
        
        if (loopSame) {
            startLevel(currentLevelKey);
        } else if (loopRandom) {
            const keys = Object.keys(WORD_LEVELS);
            if (keys.length > 0) {
                let nextKey;
                do {
                    nextKey = keys[Math.floor(Math.random() * keys.length)];
                } while (nextKey === currentLevelKey && keys.length > 1);
                startLevel(nextKey);
            } else {
                finish();
            }
        } else {
            finish();
        }
    }, 800);
}

function speakCurrentWord(word) {
    if (!isTrainerActive || !isSpeechSupported) return;

    const wordEnEl = document.getElementById('word-en');
    
    // Флаг для предотвращения двойных переходов
    let transitioning = false;
    let ruSpoken = false;

    const nextWordAction = () => {
        if (!isTrainerActive || transitioning) return;
        transitioning = true;
        clearAllTimers();
        if (wordEnEl) wordEnEl.classList.remove('speaking');
        currentIndex++;
        showCurrentWord();
    };

    const forceNextWord = (reason) => {
        if (!isTrainerActive || transitioning) return;
        console.warn(`Speech error/timeout: ${reason}. Skipping to next word.`);
        showError('trainer-error', '⚠️ Ошибка озвучки, пропускаем...');
        clearAllTimers();
        transitioning = true;
        if (wordEnEl) wordEnEl.classList.remove('speaking');
        autoNextTimeout = setTimeout(nextWordAction, 300);
    };

    // Таймер безопасности: если аудио зависло
    const safetyMs = currentMode === 'review' ? 15000 : 8000;
    safetyTimeout = setTimeout(() => forceNextWord('timeout'), safetyMs);

    // --- Озвучка английского слова ---
    try {
        const enUtterance = new SpeechSynthesisUtterance(word.en);
        enUtterance.lang = 'en-US';
        enUtterance.rate = currentMode === 'review' ? 0.9 : 0.85;
        enUtterance.pitch = 1;

        enUtterance.onstart = () => {
            if (!isTrainerActive || transitioning) return;
            if (wordEnEl) wordEnEl.classList.add('speaking');
            // Сброс таймера безопасности при успешном старте
            clearTimeout(safetyTimeout);
        };

        enUtterance.onend = () => {
            if (!isTrainerActive || transitioning) return;
            if (wordEnEl) wordEnEl.classList.remove('speaking');
            
            const pauseMs = currentMode === 'review' ? 1100 : 0;
            
            const showAndSpeakRu = () => {
                if (!isTrainerActive || transitioning || ruSpoken) return;
                ruSpoken = true;
                
                const wordRuEl = document.getElementById('word-ru');
                if (wordRuEl) wordRuEl.classList.add('visible');
                
                // --- Озвучка русского перевода ---
                try {
                    const ruUtterance = new SpeechSynthesisUtterance(word.ru);
                    ruUtterance.lang = 'ru-RU';
                    ruUtterance.rate = 0.9;
                    ruUtterance.pitch = 1;

                    ruUtterance.onend = () => {
                        if (!isTrainerActive || transitioning) return;
                        autoNextTimeout = setTimeout(nextWordAction, MODES[currentMode].autoNextDelay);
                    };
                    
                    ruUtterance.onerror = (e) => forceNextWord(`ru-onerror: ${e.error}`);
                    window.speechSynthesis.speak(ruUtterance);
                    
                } catch (e) {
                    console.error('RU speech error:', e);
                    forceNextWord('ru-exception');
                }
            };

            if (pauseMs === 0) {
                showAndSpeakRu();
            } else {
                pauseTimeout = setTimeout(showAndSpeakRu, pauseMs);
            }
        };

        enUtterance.onerror = (e) => {
            console.error('EN speech error:', e);
            forceNextWord(`en-onerror: ${e.error}`);
        };
        
        // Защита от зависания синтезатора на мобильных
        if (window.speechSynthesis.pending) {
            window.speechSynthesis.cancel();
            setTimeout(() => window.speechSynthesis.speak(enUtterance), 50);
        } else {
            window.speechSynthesis.speak(enUtterance);
        }
        
    } catch (e) {
        console.error('Speech synthesis exception:', e);
        showError('trainer-error', '❌ Ошибка синтеза речи. Проверьте настройки устройства.');
        // Если синтез полностью не работает, просто показываем слова с задержкой
        wordEnEl?.classList.add('speaking');
        pauseTimeout = setTimeout(() => {
            wordEnEl?.classList.remove('speaking');
            document.getElementById('word-ru')?.classList.add('visible');
            autoNextTimeout = setTimeout(nextWordAction, MODES[currentMode].autoNextDelay + 1000);
        }, 2000);
    }
}

function updateProgressBar() {
    const bar = document.getElementById('progress-bar');
    if (!bar || totalWordsInSession === 0) return;
    
    const percent = Math.min(100, Math.max(0, ((currentIndex + 1) / totalWordsInSession) * 100));
    bar.style.width = `${percent}%`;
    bar.setAttribute('aria-valuenow', Math.round(percent));
}

function finish() {
    isTrainerActive = false;
    showScreen('result-screen');
    const scoreEl = document.getElementById('final-score');
    if (scoreEl) scoreEl.textContent = `Пройдено: ${sessionTotalCount}`;
    document.getElementById('progress-bar').style.width = '0%';
}

function returnToMenu() {
    forceStopAll();
    sessionTotalCount = 0;
    initMenu();
}

function setMode(mode) {
    currentMode = mode;
    const btnLearn = document.getElementById('mode-learn');
    const btnReview = document.getElementById('mode-review');
    
    if (btnLearn) {
        btnLearn.classList.toggle('active', mode === 'learn');
        btnLearn.setAttribute('aria-pressed', mode === 'learn');
    }
    if (btnReview) {
        btnReview.classList.toggle('active', mode === 'review');
        btnReview.setAttribute('aria-pressed', mode === 'review');
    }
}

// Инициализация при загрузке
window.addEventListener('load', initMenu);

// Очистка при выгрузке страницы (на случай, если пользователь закроет вкладку)
window.addEventListener('beforeunload', forceStopAll);

// Обработка блокировки экрана на мобильных (восстановление синтеза)
document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && isTrainerActive && window.speechSynthesis?.paused) {
        window.speechSynthesis.resume();
    }
});
</script>
